<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c4dff"/>
      <stop offset="100%" stop-color="#00e676"/>
    </linearGradient>
    <linearGradient id="bar" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.6)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,1)"/>
    </linearGradient>
  </defs>
  <!-- Rounded background -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bg)"/>
  <!-- Bar chart bars -->
  <rect x="12" y="36" width="8" height="16" rx="2" fill="url(#bar)" opacity="0.9"/>
  <rect x="24" y="24" width="8" height="28" rx="2" fill="url(#bar)" opacity="0.95"/>
  <rect x="36" y="18" width="8" height="34" rx="2" fill="url(#bar)"/>
  <!-- Magnifying glass -->
  <circle cx="48" cy="16" r="7" fill="none" stroke="rgba(255,255,255,0.95)" stroke-width="2.5"/>
  <line x1="53" y1="21" x2="57" y2="25" stroke="rgba(255,255,255,0.95)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Star accent -->
  <polygon points="48,14 49.2,16.5 52,16.8 50,18.6 50.5,21.3 48,19.9 45.5,21.3 46,18.6 44,16.8 46.8,16.5" fill="rgba(255,255,255,0.9)"/>
</svg>
